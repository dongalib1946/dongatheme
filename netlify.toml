headersOrigin = "config"
plugins = []

[build]
publish = "."
functions = "netlify/functions"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[functions]

  [functions."*"]

[[redirects]]
from = "/bumin"
to = "/index.html"
status = 200

[[redirects]]
from = "/bumin.html"
to = "/index.html"
status = 200

[[redirects]]
from = "/admin-bumin"
to = "/admin.html"
status = 200

[[redirects]]
from = "/admin-bumin.html"
to = "/admin.html"
status = 200

[[headers]]
for = "/*"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"
