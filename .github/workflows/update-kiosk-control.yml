name: Update kiosk control

on:
  workflow_dispatch:
    inputs:
      campus:
        description: Campus to update
        required: true
        default: hallim
        type: choice
        options:
          - hallim
          - bumin
      theme:
        description: Theme to apply
        required: true
        default: keep
        type: choice
        options:
          - keep
          - navy-glass
          - aurora
          - midnight
          - slate
          - daylight
          - mint
          - coral
      reload:
        description: Send reload signal
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update control file
        run: node scripts/update-kiosk-control.js
        env:
          KIOSK_CAMPUS: ${{ inputs.campus }}
          KIOSK_THEME: ${{ inputs.theme }}
          KIOSK_RELOAD: ${{ inputs.reload }}

      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kiosk-control.json
          git diff --cached --quiet && exit 0
          git commit -m "Update kiosk control"
          git push
