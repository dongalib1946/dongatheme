name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static API data
        run: npm run generate:pages-data
        env:
          ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}

      - name: Prepare Pages artifact
        run: |
          mkdir -p .pages
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.pages' \
            ./ .pages/
          mkdir -p .pages/bumin .pages/admin-bumin
          cp .pages/index.html .pages/bumin.html
          cp .pages/index.html .pages/bumin/index.html
          cp .pages/admin.html .pages/admin-bumin.html
          cp .pages/admin.html .pages/admin-bumin/index.html
          touch .pages/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
